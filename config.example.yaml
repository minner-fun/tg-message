# Telegram 频道监控 + Telegram 机器人通知 配置文件
# 复制本文件为 config.yaml 并填写真实信息

telegram:
  # 从 https://my.telegram.org 获取
  api_id: 12345678
  api_hash: ""
  phone: ""
  session_name: "tg_monitor"
  # TG 代理（留空则不使用代理）
  # 支持 socks5 / socks4 / http
  proxy: ""
  # 用于接收通知的 Telegram 机器人配置
  # bot_token 从 @BotFather 获取
  bot_token: "1234567890:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # chat_id 可以是私聊、群组或频道 ID
  chat_id: "123456789"
  # 可选：机器人单独走代理；留空则复用上面的 proxy
  bot_proxy: ""


monitor:
  # 要监控的频道/群组（可以是用户名或数字ID）
  # 用户名不需要加 @ 符号
  # 设置为 ["all"] 或留空 [] 则监控所有已加入的频道/群组
  channels:
    - "all"
    # - "channel_username_1"
    # - "channel_username_2"
    # - -1001234567890  # 也支持数字ID

  # 关键词列表（不区分大小写）
  keywords:
    - "远程爬虫"
    - "爬虫"
    - "逆向"
    - "数据采集"

  # 可选：正则表达式匹配（留空则不启用）
  regex_patterns: []
    # - "\\d+元"           # 匹配价格
    # - "https?://\\S+"    # 匹配链接
